name: Check

on:
  push:
    branches: ['main', 'master']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-rust:
    runs-on: [self-hosted, medium]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        shell: bash
        run: |
          if [ ! -x "$HOME/.cargo/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi
          "$HOME/.cargo/bin/rustup" toolchain install stable --profile minimal
          "$HOME/.cargo/bin/rustup" default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup persistent cargo target dir
        run: |
          echo "CARGO_TARGET_DIR=$HOME/.cache/cargo-target/dazzle-check" >> $GITHUB_ENV
          mkdir -p "$HOME/.cache/cargo-target/dazzle-check"

      - name: Detect files requiring checks
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            check:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'eslint.config.cjs'
              - 'vite.config.ts'
              - 'src/**'
              - 'src-tauri/**'
              - 'packages/**'
              - '.github/workflows/check.yml'

      - name: Skip checks
        if: steps.changes.outputs.check != 'true'
        run: echo "No relevant changes detected. Skipping lint/typecheck/rust checks."

      - name: Install dependencies
        if: steps.changes.outputs.check == 'true'
        run: npm ci

      - name: Run checks
        if: steps.changes.outputs.check == 'true'
        run: |
          npm run check
          npm run test:run
          npm run build
